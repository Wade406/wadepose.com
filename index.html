<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wade Pose</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Consolas', 'Monaco', 'Lucida Console', monospace;
            background: radial-gradient(circle at center, #333 0%, #1a1a1a 100%);
            color: #d4cba8;
            height: 100vh;
            overflow: hidden;
            cursor: crosshair;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .edge-message {
            font-size: clamp(18px, 4vw, 32px);
            font-weight: 300;
            letter-spacing: clamp(1px, 0.3vw, 3px);
            margin-bottom: clamp(30px, 6vw, 50px);
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s ease-in-out 0.5s forwards;
        }
        
        .exit-button {
            padding: clamp(12px, 2vw, 20px) clamp(25px, 5vw, 40px);
            background: transparent;
            border: 2px solid #d4cba8;
            color: #d4cba8;
            font-family: inherit;
            font-size: clamp(14px, 2vw, 18px);
            letter-spacing: clamp(1px, 0.2vw, 2px);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 2s ease-in-out 1.5s forwards;
        }
        
        .exit-button:hover {
            background: #d4cba8;
            color: #1a1a1a;
            box-shadow: 0 0 clamp(15px, 3vw, 30px) rgba(212, 203, 168, 0.4);
            transform: scale(1.05);
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
        
        @media (max-width: 768px) {
            .edge-message {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="edge-message">
        You've reached the edge of the simulation
    </div>
    
    <button class="exit-button" onclick="window.location.href='intersection.html'">
        Exit Simulation Now
    </button>
</body>
</html>
